<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Mode Keeper</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="popup-shell">
      <h1>Gemini Mode Keeper</h1>
      <p class="subtitle">Settings for model correction in Gemini.</p>

      <form id="settings-form" class="settings-list">
        <label class="setting-row">
          <input id="enableModelCheck" type="checkbox">
          <span>Enable model check and auto-correction</span>
        </label>

        <label class="setting-row">
          <input id="showCorrectionNotification" type="checkbox">
          <span>Show correction notification</span>
        </label>

        <label class="setting-row">
          <input id="hideUpgradeButton" type="checkbox">
          <span>Hide upgrade button</span>
        </label>

        <div class="actions">
          <button id="saveButton" type="submit">Save</button>
          <span id="statusText" aria-live="polite"></span>
        </div>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
