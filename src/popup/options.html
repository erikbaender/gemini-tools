<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Tools</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="popup-shell">
      <form id="settings-form" class="settings-list">
        <section class="setting-card setting-card-single">
          <div class="mode-picker-header">
            <span class="setting-title">Preferred mode</span>
            <span class="setting-description">The extension will restore this mode if Gemini switches away from it.</span>
          </div>
          <div class="mode-picker-options" role="group" aria-label="Preferred mode">
            <label class="mode-option" id="modeFastLabel">
              <input class="mode-input" type="radio" name="preferredMode" id="modeFast" value="fast">
              <span class="mode-option-copy">
                <span class="mode-option-title">Fast</span>
                <span class="mode-option-description">Gemini 2.5 Flash — quick responses.</span>
              </span>
            </label>
            <label class="mode-option" id="modeThinkingLabel">
              <input class="mode-input" type="radio" name="preferredMode" id="modeThinking" value="thinking">
              <span class="mode-option-copy">
                <span class="mode-option-title">Thinking</span>
                <span class="mode-option-description">Gemini 2.5 Flash Thinking — extended reasoning.</span>
              </span>
            </label>
            <label class="mode-option mode-option-last" id="modeProLabel">
              <input class="mode-input" type="radio" name="preferredMode" id="modePro" value="pro">
              <span class="mode-option-copy">
                <span class="mode-option-title">Pro</span>
                <span class="mode-option-description">Gemini 2.5 Pro — most capable model.</span>
              </span>
            </label>
          </div>
        </section>

        <section class="setting-card">
          <label class="setting-row setting-row-parent">
            <input class="setting-input" id="enableModelCheck" type="checkbox">
            <span class="setting-copy">
              <span class="setting-title">Enable mode correction</span>
              <span class="setting-description">Restore your preferred model when Gemini switches it automatically.</span>
            </span>
          </label>

          <div class="setting-subtree" id="notificationGroup">
            <label class="setting-row setting-row-child" id="notificationRow">
              <input class="setting-input" id="showCorrectionNotification" type="checkbox">
              <span class="setting-copy">
                <span class="setting-title">Show correction notification</span>
                <span class="setting-description">Display a small toast when mode correction was applied.</span>
              </span>
            </label>
          </div>
        </section>

        <section class="setting-card setting-card-single">
          <label class="setting-row">
            <input class="setting-input" id="hideUpgradeButton" type="checkbox">
            <span class="setting-copy">
              <span class="setting-title">Hide upgrade button</span>
              <span class="setting-description">Remove Gemini's top-right upgrade action from the interface.</span>
            </span>
          </label>
        </section>

        <section class="setting-card setting-card-single">
          <label class="setting-row">
            <input class="setting-input" id="enableEnterNewline" type="checkbox">
            <span class="setting-copy">
              <span class="setting-title">Enter inserts newline</span>
              <span class="setting-description">Use Enter for line breaks in the chat input and Shift+Enter to send.</span>
            </span>
          </label>
        </section>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
